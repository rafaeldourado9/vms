name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ─────────────────────────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install ruff
      - run: |
          cd api && ruff check src/ tests/
          cd ../analytics && ruff check src/ tests/
          cd ../edge_agent && ruff check src/ tests/

  backend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: |
          cd api && pip install -e ".[dev]" && mypy src/vms --ignore-missing-imports
          cd ../analytics && pip install -e ".[dev]" && mypy src/analytics --ignore-missing-imports

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vms_test
          POSTGRES_USER: vms
          POSTGRES_PASSWORD: vmsdev
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U vms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: |
          cd api
          pip install -e ".[dev]"
          pytest tests/unit/ tests/integration/ -v --tb=short

  # ─── Frontend ────────────────────────────────────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'frontend/package-lock.json' }
      - run: cd frontend && npm ci && npx tsc --noEmit

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'frontend/package-lock.json' }
      - run: cd frontend && npm ci && npm test -- --run

  # ─── Build ───────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-typecheck, backend-test, frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API
        run: docker build -f api/Dockerfile --target production api/
      - name: Build Analytics
        run: docker build -f analytics/Dockerfile --target cpu analytics/
      - name: Build Edge Agent
        run: docker build -f edge_agent/Dockerfile edge_agent/
      - name: Build Frontend
        run: docker build -f frontend/Dockerfile frontend/
