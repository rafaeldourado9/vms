services:
  # ─── Infraestrutura ──────────────────────────────────────────────────────
  postgres:
    build:
      context: ./infra/postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vms}
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vmsdev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vms} -d ${POSTGRES_DB:-vms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [vms]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [vms]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-vms}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-vmsdev}
    ports:
      - "15672:15672"   # management UI (dev only)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [vms]

  # ─── Streaming ────────────────────────────────────────────────────────────
  mediamtx:
    build:
      context: ./infra/mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
    environment:
      - TURN_URL=${TURN_URL:-}
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - recordings:/recordings
    networks: [vms]

  # ─── API Service ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      target: production
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-vms}:${POSTGRES_PASSWORD:-vmsdev}@postgres:5432/${POSTGRES_DB:-vms}
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-vms}:${RABBITMQ_PASSWORD:-vmsdev}@rabbitmq:5672/
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-prod}
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_RTMP_URL=rtmp://mediamtx:1935
      - RECORDINGS_PATH=/recordings
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - VMS_API_KEY=${VMS_API_KEY:-dev-analytics-key}
    volumes:
      - recordings:/recordings
      - vod_streams:/tmp/vod
      - tunnel_data:/tunnel:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [vms]

  # ─── Worker (ARQ background tasks) ────────────────────────────────────────
  worker:
    build:
      context: ./api
      target: production
    restart: unless-stopped
    command: python -m arq vms.worker.WorkerSettings
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-vms}:${POSTGRES_PASSWORD:-vmsdev}@postgres:5432/${POSTGRES_DB:-vms}
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-vms}:${RABBITMQ_PASSWORD:-vmsdev}@rabbitmq:5672/
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-prod}
      - RECORDINGS_PATH=/recordings
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - recordings:/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [vms]

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    networks: [vms]

  # ─── Nginx (reverse proxy) ────────────────────────────────────────────────
  nginx:
    build:
      context: ./infra/nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - ./infra/nginx/certbot:/var/www/certbot:ro
      - recordings:/recordings:ro
      - vod_streams:/tmp/vod:ro
    depends_on:
      - api
      - frontend
    networks: [vms]

  # ─── Cloudflare Tunnel (dev — expõe API para webhooks externos) ──────────
  cloudflared:
    build:
      context: ./infra/cloudflared
    restart: unless-stopped
    command: >
      --url http://nginx:80
      --protocol http2
      --no-autoupdate
    volumes:
      - tunnel_data:/tunnel
    depends_on:
      - nginx
    profiles: [dev]                  # `docker compose --profile dev up`
    networks: [vms]

  # ─── Backup (job pontual — não fica rodando) ──────────────────────────────
  backup:
    build:
      context: ./infra/scripts
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-vms}
      - POSTGRES_USER=${POSTGRES_USER:-vms}
      - PGPASSWORD=${POSTGRES_PASSWORD:-vmsdev}
      - BACKUP_DIR=/backups
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [backup]               # `docker compose --profile backup run --rm backup`
    networks: [vms]

volumes:
  pgdata:
  recordings:
  vod_streams:
  backups:
  tunnel_data:

networks:
  vms:
    driver: bridge
