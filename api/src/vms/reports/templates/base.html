<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: A4;
            margin: 2cm;
            @bottom-right {
                content: "Página " counter(page) " de " counter(pages);
                font-size: 9pt;
                color: #666;
            }
            @bottom-left {
                content: "Gerado por vCloud VMS";
                font-size: 8pt;
                color: #666;
            }
        }
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            font-size: 11pt;
            color: #333;
            line-height: 1.4;
        }
        .header {
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 18pt;
            color: #2c3e50;
            margin: 0;
        }
        .header p {
            font-size: 9pt;
            color: #7f8c8d;
            margin: 5px 0 0 0;
        }
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid #3498db;
            padding: 10px;
            margin-bottom: 20px;
        }
        .info-box table {
            width: 100%;
            border-collapse: collapse;
        }
        .info-box td {
            padding: 4px;
            font-size: 10pt;
        }
        .info-box td:first-child {
            font-weight: bold;
            width: 120px;
            color: #2c3e50;
        }
        table.data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 9pt;
        }
        table.data-table th {
            background-color: #2c3e50;
            color: white;
            text-align: left;
            padding: 8px;
        }
        table.data-table td {
            border-bottom: 1px solid #eee;
            padding: 6px 8px;
        }
        table.data-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 8pt;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 8pt;
            font-weight: bold;
            color: white;
        }
        .status-success { background-color: #27ae60; }
        .status-warning { background-color: #f39c12; }
        .status-error { background-color: #c0392b; }
        .chart-placeholder {
            width: 100%;
            height: 200px;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            border: 1px dashed #ccc;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ title }}</h1>
        <p>Relatório Gerado Automaticamente em {{ generated_at }}</p>
    </div>

    {% block content %}{% endblock %}

    <div class="footer">
        <p>vCloud VMS — Video Management System | Documento confidencial</p>
    </div>
</body>
</html>
