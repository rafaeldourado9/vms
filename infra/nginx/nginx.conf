worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ─── Security Headers ────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "DENY"            always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Ocultar versão do Nginx
    server_tokens off;

    # ─── Rate Limiting (camada Nginx) ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m     rate=30r/m;

    # ─── Logging ─────────────────────────────────────────────────────────
    log_format json escape=json
        '{"time":"$time_iso8601",'
         '"remote_addr":"$remote_addr",'
         '"method":"$request_method",'
         '"uri":"$request_uri",'
         '"status":$status,'
         '"body_bytes":$body_bytes_sent,'
         '"referer":"$http_referer",'
         '"user_agent":"$http_user_agent",'
         '"request_time":$request_time}';

    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # ─── Upstream ────────────────────────────────────────────────────────
    upstream vms_api {
        server api:8000;
    }

    upstream mediamtx_hls {
        server mediamtx:8888;
    }

    upstream mediamtx_webrtc {
        server mediamtx:8889;
    }

    # ─── Server ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Limitar tamanho de body (proteção contra upload abusivo)
        client_max_body_size 10m;

        # ── API ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://vms_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Webhooks ────────────────────────────────────────────────────
        location /webhooks/ {
            limit_req zone=webhook burst=10 nodelay;
            proxy_pass http://vms_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── SSE ─────────────────────────────────────────────────────────
        location /api/v1/sse {
            proxy_pass http://vms_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header Connection        "";
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # ── Health ──────────────────────────────────────────────────────
        location /health {
            proxy_pass http://vms_api;
        }

        # ── Docs ────────────────────────────────────────────────────────
        location /docs {
            proxy_pass http://vms_api;
        }

        location /redoc {
            proxy_pass http://vms_api;
        }

        location /openapi.json {
            proxy_pass http://vms_api;
        }

        # ── HLS Streaming ──────────────────────────────────────────────
        location /hls/ {
            proxy_pass http://mediamtx_hls/;
            proxy_set_header Host $host;
        }

        # ── WebRTC Streaming ───────────────────────────────────────────
        location /webrtc/ {
            proxy_pass http://mediamtx_webrtc/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Recordings (servidos diretamente) ──────────────────────────
        location /recordings/ {
            alias /recordings/;
            autoindex off;
            add_header Cache-Control "private, no-cache";
        }

        # ── Internal endpoints (bloquear acesso externo) ───────────────
        location /internal/ {
            deny all;
            return 403;
        }
    }
}
