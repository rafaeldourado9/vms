worker_processes auto;
pid /run/nginx.pid;

events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # DNS interno do Docker
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Rate Limiting ──────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m    rate=200r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m        rate=300r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m           rate=10r/m;
    limit_req_zone $binary_remote_addr zone=public_webhook:10m rate=1200r/m;
    limit_req_zone $binary_remote_addr zone=recordings:10m     rate=600r/m;

    # ── Logging JSON ───────────────────────────────────────────────────────────
    log_format json escape=json
        '{"time":"$time_iso8601",'
         '"remote_addr":"$remote_addr",'
         '"method":"$request_method",'
         '"uri":"$request_uri",'
         '"status":$status,'
         '"body_bytes":$body_bytes_sent,'
         '"request_time":$request_time}';

    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream vms_api      { server api:8000;      keepalive 32; }
    upstream vms_frontend { server frontend:80;   keepalive 16; }
    upstream mediamtx_hls      { server mediamtx:8888; }
    upstream mediamtx_webrtc   { server mediamtx:8889; }
    upstream mediamtx_playback { server mediamtx:9996; }

    # ── Servidor HTTP (cloudflared faz TLS externamente) ──────────────────────
    server {
        listen 80;
        server_name _;
        client_max_body_size 10m;

        add_header X-Content-Type-Options "nosniff"                    always;
        add_header X-Frame-Options        "DENY"                       always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── Frontend SPA ───────────────────────────────────────────────────
        location / {
            proxy_pass         http://vms_frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── Auth ───────────────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── Segment streaming — alto burst (hls.js faz múltiplos fetches em paralelo)
        location = /api/v1/recordings/segment {
            limit_req zone=recordings burst=100 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
        }

        # ── API ────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── Webhooks autenticados ──────────────────────────────────────────
        location /webhooks/ {
            limit_req zone=webhook burst=10 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── SSE ────────────────────────────────────────────────────────────
        location /api/v1/sse {
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400s;
        }

        # ── Health check ───────────────────────────────────────────────────
        location = /api/v1/health {
            proxy_pass http://vms_api;
            access_log off;
        }

        # ── API Docs ───────────────────────────────────────────────────────
        location /docs        { proxy_pass http://vms_api; }
        location /redoc       { proxy_pass http://vms_api; }
        location /openapi.json { proxy_pass http://vms_api; }

        # ── HLS ────────────────────────────────────────────────────────────
        location /hls/ {
            proxy_pass         http://mediamtx_hls/;
            proxy_redirect     ~^/(.+)$ /hls/$1;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ── WebRTC ─────────────────────────────────────────────────────────
        location /webrtc/ {
            proxy_pass         http://mediamtx_webrtc/;
            proxy_set_header   Host       $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ── Segmentos .ts e .m3u8 internos — servidos pela API (autenticados) ──
        # ^ ancora no inicio: bloqueia apenas /recordings/... direto, não /api/v1/.../recordings/...
        location ~* ^/recordings/.*\.(ts|m3u8)$ {
            return 403;
        }

        # ── Gravações (fMP4 segments referenciados pela playlist HLS) ─────────
        location /recordings/ {
            alias /recordings/;
            autoindex off;

            # MIME types for HLS content (fMP4 + standard TS fallback)
            types {
                video/mp4                     mp4;
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                    ts;
            }

            # CORS preflight — Range is not a safelisted header, triggers OPTIONS
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*';
                add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Range, Content-Type';
                add_header 'Access-Control-Max-Age'        1728000;
                add_header 'Content-Length'                0;
                return 204;
            }

            add_header Accept-Ranges                 bytes                    always;
            add_header Access-Control-Allow-Origin   "*"                      always;
            add_header Access-Control-Allow-Methods  "GET, HEAD, OPTIONS"     always;
            add_header Access-Control-Allow-Headers  "Range"                  always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
            add_header Cache-Control                 "private, no-cache"      always;
        }

        # ── MediaMTX VOD Playback ──────────────────────────────────────────────
        # GET /mediamtx-playback/get?path=tenant-{id}/cam-{id}&start=RFC3339&end=RFC3339
        # Retorna HLS playlist dos fMP4 gravados — MediaMTX monta o manifesto.
        location /mediamtx-playback/ {
            proxy_pass         http://mediamtx_playback/;
            proxy_set_header   Host              $host;
            proxy_http_version 1.1;
            proxy_buffering    off;
            proxy_cache        off;
            add_header         Access-Control-Allow-Origin  "*"   always;
            add_header         Access-Control-Allow-Headers "Range" always;
        }

        # ── Snapshots (servidos autenticados via API) ─────────────────────
        location /snapshots/ { return 403; }

        # ── Bloquear internos ──────────────────────────────────────────────
        location /internal/ { deny all; return 403; }

        # ──────────────────────────────────────────────────────────────────
        # Webhooks públicos — câmeras POSTam eventos sem autenticação
        # ──────────────────────────────────────────────────────────────────

        # Hikvision Alarm Server (path custom configurável)
        location = /hik_pro_connect {
            limit_req zone=public_webhook burst=100 nodelay;
            proxy_pass         http://vms_api/webhooks/hik_pro_connect$is_args$args;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }

        # Hikvision ISAPI — paths default que o firmware envia quando
        # o Alarm Server não permite URL custom. Todos caem no mesmo handler.
        location = /Event                                  { limit_req zone=public_webhook burst=100 nodelay; proxy_pass http://vms_api/webhooks/Event$is_args$args; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_read_timeout 10s; }
        location = /Event/notification/alertStream         { limit_req zone=public_webhook burst=100 nodelay; proxy_pass http://vms_api/webhooks/Event/notification/alertStream$is_args$args; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_read_timeout 10s; }
        location = /ISAPI/Event/notification/alertStream   { limit_req zone=public_webhook burst=100 nodelay; proxy_pass http://vms_api/webhooks/ISAPI/Event/notification/alertStream$is_args$args; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_read_timeout 10s; }
        location = /EventNotificationAlert                 { limit_req zone=public_webhook burst=100 nodelay; proxy_pass http://vms_api/webhooks/EventNotificationAlert$is_args$args; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_read_timeout 10s; }

        # Intelbras genérico (configurável pelo integrador)
        # Suporta:
        #   /intelbras_events                          → sem identificação (fallback por IP/serial)
        #   /intelbras_events?camera_id=<uuid>         → query param
        #   /intelbras_events/<uuid>                   → path param (Função Push não suporta query)
        location = /intelbras_events {
            limit_req zone=public_webhook burst=100 nodelay;
            proxy_pass         http://vms_api/webhooks/intelbras_events$is_args$args;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }

        location ^~ /intelbras_events/ {
            limit_req zone=public_webhook burst=100 nodelay;
            proxy_pass         http://vms_api/webhooks/intelbras_events/$is_args$args;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }

        # Genérico
        location = /camera_events {
            limit_req zone=public_webhook burst=100 nodelay;
            proxy_pass         http://vms_api/webhooks/camera_events$is_args$args;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }

        # Intelbras ITSCAM / ANPR — path hardcoded no firmware
        # Câmera configura apenas o host; firmware sempre envia para este path.
        # ?camera_id=<uuid> deve ser incluído na URL base configurada na câmera
        # para que $is_args$args repasse o parâmetro à API.
        location = /NotificationInfo/TollgateInfo {
            limit_req          zone=public_webhook burst=100 nodelay;
            client_max_body_size 20m;
            proxy_pass         http://vms_api/webhooks/intelbras_events$is_args$args;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }

        # Intelbras ITSCAM / ANPR — KeepAlive heartbeat (Dahua ITCPUSH)
        # Sem resposta {"Result": true} a câmera marca o servidor como offline
        # e dispara replay de eventos antigos.
        location = /NotificationInfo/KeepAlive {
            limit_req          zone=public_webhook burst=100 nodelay;
            proxy_pass         http://vms_api/webhooks/intelbras_keepalive$is_args$args;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 5s;
        }
    }
}
