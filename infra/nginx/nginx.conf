worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Ocultar versão do Nginx
    server_tokens off;

    # ─── Rate Limiting ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m     rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m        rate=5r/m;
    limit_req_zone $binary_remote_addr zone=public_webhook:10m rate=120r/m;

    # ─── Logging (JSON estruturado) ──────────────────────────────────────
    log_format json escape=json
        '{"time":"$time_iso8601",'
         '"remote_addr":"$remote_addr",'
         '"method":"$request_method",'
         '"uri":"$request_uri",'
         '"status":$status,'
         '"body_bytes":$body_bytes_sent,'
         '"referer":"$http_referer",'
         '"user_agent":"$http_user_agent",'
         '"request_time":$request_time}';

    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # ─── Upstreams ───────────────────────────────────────────────────────
    upstream vms_api {
        server api:8000;
        keepalive 32;
    }

    upstream vms_frontend {
        server frontend:80;
        keepalive 16;
    }

    upstream mediamtx_hls {
        server mediamtx:8888;
    }

    upstream mediamtx_webrtc {
        server mediamtx:8889;
    }

    # ─── HTTP → HTTPS redirect ───────────────────────────────────────────
    server {
        listen 80;
        server_name ${DOMAIN};

        # Permitir ACME challenge (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name ${DOMAIN};

        # ── TLS ────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security Headers ───────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"         always;
        add_header X-Frame-Options           "DENY"            always;
        add_header X-XSS-Protection          "1; mode=block"   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://maps.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://${DOMAIN} https://maps.googleapis.com https://maps.google.com http://${DOMAIN}:8888 https://${DOMAIN}:8888 http://${DOMAIN}:8889 https://${DOMAIN}:8889 wss://${DOMAIN}:8889; media-src 'self' blob: http://${DOMAIN}:8888 https://${DOMAIN}:8888 http://${DOMAIN}:8889 https://${DOMAIN}:8889; frame-src 'self' https://maps.google.com https://www.google.com; frame-ancestors 'none';" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # Limitar tamanho de body
        client_max_body_size 10m;

        # ── Frontend SPA ───────────────────────────────────────────────
        location / {
            proxy_pass         http://vms_frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── Auth (rate limit agressivo) ────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── API ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── Webhooks (câmeras → VMS) ────────────────────────────────────
        location /webhooks/ {
            limit_req zone=webhook burst=10 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── SSE (Server-Sent Events — sem buffering) ───────────────────
        location /api/v1/sse {
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400s;
        }

        # ── Health check (sem auth) ────────────────────────────────────
        location = /api/v1/health {
            proxy_pass http://vms_api;
            access_log off;
        }

        # ── API Docs (OpenAPI) ─────────────────────────────────────────
        location /docs {
            proxy_pass http://vms_api;
        }
        location /redoc {
            proxy_pass http://vms_api;
        }
        location /openapi.json {
            proxy_pass http://vms_api;
        }

        # ── HLS Streaming (proxy direto ao MediaMTX — tokens validados pelo MediaMTX) ──
        location /hls/ {
            proxy_pass         http://mediamtx_hls/;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ── WebRTC Streaming (proxy direto ao MediaMTX com upgrade WebSocket) ─
        location /webrtc/ {
            proxy_pass         http://mediamtx_webrtc/;
            proxy_set_header   Host       $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ── Gravações (servidas diretamente pelo nginx com byte-range) ───
        # Sem auth_request - o acesso é controlado pela listagem no backend.
        # Uma vez que o usuário tem os file_paths, pode reproduzir.
        location /recordings/ {
            alias      /recordings/;
            autoindex  off;

            # Byte-range para seeks eficientes (estilo YouTube)
            add_header Accept-Ranges      bytes always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Cache-Control      "private, no-cache";
        }

        # ── VOD Streaming (HLS gerado dinamicamente) ───
        location /vod-streams/ {
            alias      /tmp/vod/;
            autoindex  off;

            # HLS streaming headers
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Cache-Control      "public, max-age=3600";
            add_header Accept-Ranges      bytes always;

            # Tipos MIME corretos
            types {
                application/vnd.apple.mpegurl m3u8;
                video/MP2T ts;
            }
        }

        # ── Bloquear endpoints internos ────────────────────────────────
        location /internal/ {
            deny all;
            return 403;
        }

        # ── Webhooks públicos (câmeras POSTam eventos diretamente) ─────────

        location = /hik_pro_connect {
            limit_req zone=public_webhook burst=20 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }

        location = /intelbras_events {
            limit_req zone=public_webhook burst=20 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }

        location = /camera_events {
            limit_req zone=public_webhook burst=20 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_read_timeout 10s;
        }
    }
}
