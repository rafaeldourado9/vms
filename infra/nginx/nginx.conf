worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    server_tokens off;

    # ─── Rate Limiting ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m     rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m        rate=5r/m;

    # ─── Logging ─────────────────────────────────────────────────────────
    log_format json escape=json
        '{"time":"$time_iso8601",'
         '"remote_addr":"$remote_addr",'
         '"method":"$request_method",'
         '"uri":"$request_uri",'
         '"status":$status,'
         '"body_bytes":$body_bytes_sent,'
         '"request_time":$request_time}';

    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    # ─── Upstreams ───────────────────────────────────────────────────────
    upstream vms_api {
        server api:8000;
        keepalive 32;
    }

    upstream vms_frontend {
        server frontend:80;
        keepalive 16;
    }

    upstream mediamtx_hls {
        server mediamtx:8888;
    }

    upstream mediamtx_webrtc {
        server mediamtx:8889;
    }

    # ─── HTTP Server ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        add_header X-Content-Type-Options  "nosniff"       always;
        add_header X-Frame-Options         "DENY"          always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── Frontend SPA ───────────────────────────────────────────────
        location / {
            proxy_pass         http://vms_frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── Auth (rate limit agressivo) ────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── API ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── Webhooks (câmeras → VMS) ───────────────────────────────────
        location /webhooks/ {
            limit_req zone=webhook burst=30 nodelay;
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
        }

        # ── SSE (sem buffering) ────────────────────────────────────────
        location /api/v1/sse {
            proxy_pass         http://vms_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400s;
        }

        # ── Health ─────────────────────────────────────────────────────
        location = /health {
            proxy_pass http://vms_api;
            access_log off;
        }

        # ── API Docs ───────────────────────────────────────────────────
        location /docs        { proxy_pass http://vms_api; }
        location /redoc       { proxy_pass http://vms_api; }
        location /openapi.json { proxy_pass http://vms_api; }

        # ── HLS Streaming ──────────────────────────────────────────────
        location /hls/ {
            auth_request /streaming-auth-check;
            proxy_pass   http://mediamtx_hls/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }

        # ── WebRTC Streaming ───────────────────────────────────────────
        location /webrtc/ {
            auth_request /streaming-auth-check;
            proxy_pass   http://mediamtx_webrtc/;
            proxy_set_header Host       $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── Auth subrequest para streaming ─────────────────────────────
        location = /streaming-auth-check {
            internal;
            proxy_pass              http://vms_api/streaming/auth-check?token=$arg_token&path=$arg_path;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
        }

        # ── Gravações (estáticos com auth) ─────────────────────────────
        location /recordings/ {
            auth_request /recordings-auth-check;
            alias        /recordings/;
            autoindex    off;
            add_header   Cache-Control "private, no-cache";
        }

        location = /recordings-auth-check {
            internal;
            proxy_pass              http://vms_api/streaming/auth-check?token=$arg_token&path=$uri;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Authorization $http_authorization;
        }

        # ── Bloquear endpoints internos ────────────────────────────────
        location /internal/ {
            deny all;
            return 403;
        }
    }
}
